<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Control de Gastos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f13;
    --bg2: #17171e;
    --bg3: #1f1f28;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.12);
    --text: #f0eee8;
    --text2: #8a8898;
    --text3: #5a5a6e;
    --accent: #c8f064;
    --accent2: #a8d444;
    --red: #ff6b6b;
    --amber: #fbbf24;
    --blue: #60a5fa;
    --purple: #a78bfa;
    --teal: #34d399;

    --cat-comida: #f97316;
    --cat-transporte: #60a5fa;
    --cat-seguro: #0ea5e9;
    --cat-entretenimiento: #a78bfa;
    --cat-salud: #34d399;
    --cat-servicios: #fbbf24;
    --cat-ropa: #f472b6;
    --cat-postres: #e879f9;
    --cat-despensa: #84cc16;
    --cat-rufo: #ea580c;
    --cat-capacitacion: #6366f1;
    --cat-otro: #8a8898;
  }

  html, body { height: 100%; overflow: hidden; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Outfit', sans-serif;
    font-weight: 400;
    -webkit-font-smoothing: antialiased;
    display: flex;
    flex-direction: column;
    height: 100vh;
  }

  /* TITLEBAR */
  .titlebar {
    height: 38px;
    -webkit-app-region: drag;
    background: var(--bg);
    display: flex;
    align-items: center;
    padding: 0 80px 0 20px;
    flex-shrink: 0;
    border-bottom: 1px solid var(--border);
  }
  .titlebar-title {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text3);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  /* LAYOUT */
  .app {
    display: grid;
    grid-template-columns: 260px 1fr;
    flex: 1;
    overflow: hidden;
  }

  /* SIDEBAR */
  .sidebar {
    background: var(--bg2);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    padding: 0;
    overflow: hidden;
  }

  .sidebar-header {
    padding: 24px 20px 16px;
    border-bottom: 1px solid var(--border);
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 20px;
  }
  .brand-icon {
    width: 32px;
    height: 32px;
    background: var(--accent);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .brand-icon svg { width: 16px; height: 16px; }
  .brand-name {
    font-family: 'DM Serif Display', serif;
    font-size: 18px;
    color: var(--text);
    letter-spacing: -0.02em;
  }

  .stat-card {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    margin-bottom: 8px;
  }
  .stat-label {
    font-size: 10px;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    font-family: 'DM Mono', monospace;
    margin-bottom: 4px;
  }
  .stat-value {
    font-size: 22px;
    font-weight: 600;
    color: var(--accent);
    font-family: 'DM Mono', monospace;
    letter-spacing: -0.02em;
  }
  .stat-card--tips .stat-value { color: var(--amber); }
  .stat-sub {
    font-size: 11px;
    color: var(--text3);
    margin-top: 2px;
  }

  /* FORM */
  .form-section {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
  }
  .form-section::-webkit-scrollbar { width: 3px; }
  .form-section::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  .form-title {
    font-size: 11px;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    font-family: 'DM Mono', monospace;
    margin-bottom: 12px;
  }

  .field { margin-bottom: 10px; }
  .field label {
    display: block;
    font-size: 11px;
    color: var(--text2);
    margin-bottom: 5px;
    font-family: 'DM Mono', monospace;
  }

  input, select {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'Outfit', sans-serif;
    font-size: 13px;
    padding: 9px 12px;
    outline: none;
    transition: border-color 0.15s;
    -webkit-app-region: no-drag;
  }
  input:focus, select:focus { border-color: var(--accent); }
  select option { background: var(--bg3); }

  /* Icono del calendario (date/month): el predeterminado casi no se ve en fondo oscuro */
  input[type="date"]::-webkit-calendar-picker-indicator,
  input[type="month"]::-webkit-calendar-picker-indicator {
    filter: invert(1) brightness(1.05);
    opacity: 0.88;
    cursor: pointer;
    padding: 4px;
    margin: 0 -2px 0 4px;
    transform: scale(1.12);
  }
  input[type="date"]:hover::-webkit-calendar-picker-indicator,
  input[type="month"]:hover::-webkit-calendar-picker-indicator {
    opacity: 1;
    filter: invert(1) brightness(1.2);
  }

  .btn-add {
    width: 100%;
    padding: 11px;
    background: var(--accent);
    color: #0f0f13;
    border: none;
    border-radius: 8px;
    font-family: 'Outfit', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 4px;
    transition: background 0.15s, transform 0.1s;
    -webkit-app-region: no-drag;
    letter-spacing: 0.02em;
  }
  .btn-add:hover { background: var(--accent2); }
  .btn-add:active { transform: scale(0.98); }

  /* CATEGORY BARS */
  .cat-bars { margin-top: 16px; }
  .cat-bar-item { margin-bottom: 8px; }
  .cat-bar-info { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
  .cat-bar-name { font-size: 11px; color: var(--text2); display: flex; align-items: center; gap: 6px; }
  .cat-dot { width: 6px; height: 6px; border-radius: 50%; }
  .cat-bar-val { font-size: 11px; color: var(--text2); font-family: 'DM Mono', monospace; }
  .cat-bar-bg { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .cat-bar-fill { height: 100%; border-radius: 2px; transition: width 0.4s ease; }

  /* MAIN */
  .main {
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .main-header {
    padding: 20px 28px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }

  .main-title {
    font-family: 'DM Serif Display', serif;
    font-size: 24px;
    color: var(--text);
    letter-spacing: -0.03em;
  }
  .main-title em { color: var(--accent); font-style: italic; }

  .main-header-actions {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }
  .month-nav-label {
    font-size: 11px;
    color: var(--text3);
    font-family: 'DM Mono', monospace;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .input-month {
    width: auto;
    min-width: 148px;
    padding: 8px 12px;
    font-size: 13px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
  }

  .btn-export {
    width: 100%;
    padding: 9px 12px;
    margin-top: 8px;
    background: transparent;
    color: var(--text2);
    border: 1px solid var(--border);
    border-radius: 8px;
    font-family: 'Outfit', sans-serif;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    -webkit-app-region: no-drag;
  }
  .btn-export:hover {
    border-color: var(--accent);
    color: var(--accent);
  }
  .btn-export.secondary { margin-top: 6px; font-size: 11px; color: var(--text3); }

  /* FILTER */
  .filter-bar {
    padding: 12px 28px;
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 8px;
    flex-shrink: 0;
  }
  .filter-btn {
    padding: 5px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text2);
    font-size: 12px;
    font-family: 'Outfit', sans-serif;
    cursor: pointer;
    transition: all 0.15s;
    -webkit-app-region: no-drag;
  }
  .filter-btn:hover { border-color: var(--border2); color: var(--text); }
  .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #0f0f13; font-weight: 600; }

  .filter-bar-person {
    border-top: 1px solid var(--border);
    align-items: center;
  }
  .filter-group-label {
    font-size: 11px;
    color: var(--text3);
    font-family: 'DM Mono', monospace;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-right: 4px;
    flex-shrink: 0;
  }

  .filter-bar-desc {
    border-top: 1px solid var(--border);
    align-items: center;
    flex-wrap: wrap;
    gap: 10px;
  }
  .input-filter-desc {
    flex: 1;
    min-width: 160px;
    max-width: 360px;
    padding: 8px 12px;
    font-size: 13px;
  }
  .input-filter-desc::placeholder { color: var(--text3); opacity: 0.8; }

  /* LIST */
  .list-wrap {
    flex: 1;
    overflow-y: auto;
    padding: 16px 28px;
  }
  .list-wrap::-webkit-scrollbar { width: 3px; }
  .list-wrap::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 200px;
    color: var(--text3);
    gap: 8px;
  }
  .empty-icon { font-size: 32px; opacity: 0.4; }
  .empty-text { font-size: 14px; }

  .gasto-item {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 16px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 8px;
    transition: border-color 0.15s, transform 0.1s;
    animation: slideIn 0.2s ease;
    cursor: pointer;
  }
  .gasto-item:hover { border-color: var(--border2); }
  .gasto-item:hover .btn-delete { opacity: 1; }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .gasto-cat-icon {
    width: 38px;
    height: 38px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
  }

  .gasto-info { flex: 1; min-width: 0; }
  .gasto-desc {
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 2px;
  }
  .gasto-meta {
    font-size: 11px;
    color: var(--text3);
    font-family: 'DM Mono', monospace;
    display: flex;
    gap: 8px;
    align-items: center;
    flex-wrap: wrap;
  }
  .gasto-persona {
    color: var(--text2);
    font-weight: 500;
  }
  .gasto-cat-tag {
    padding: 1px 7px;
    border-radius: 10px;
    font-size: 10px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .gasto-monto-wrap {
    flex-shrink: 0;
    text-align: right;
  }
  .gasto-monto {
    font-family: 'DM Mono', monospace;
    font-size: 16px;
    font-weight: 500;
    color: var(--text);
  }
  .gasto-tip-badge {
    display: inline-block;
    margin-top: 6px;
    padding: 4px 9px;
    border-radius: 8px;
    font-size: 11px;
    font-weight: 600;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.02em;
    color: var(--amber);
    background: rgba(251, 191, 36, 0.16);
    border: 1px solid rgba(251, 191, 36, 0.45);
    box-shadow: 0 0 12px rgba(251, 191, 36, 0.08);
  }

  .btn-delete {
    background: none;
    border: none;
    color: var(--text3);
    cursor: pointer;
    padding: 4px;
    border-radius: 6px;
    opacity: 0;
    transition: all 0.15s;
    -webkit-app-region: no-drag;
    flex-shrink: 0;
  }
  .btn-delete:hover { color: var(--red); background: rgba(255,107,107,0.1); }

  /* EDIT MODAL */
  .edit-overlay {
    position: fixed;
    inset: 0;
    background: rgba(15,15,19,0.72);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    z-index: 1000;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
    -webkit-app-region: no-drag;
  }
  .edit-overlay.open {
    opacity: 1;
    pointer-events: auto;
  }
  .edit-modal {
    width: 100%;
    max-width: 380px;
    background: var(--bg2);
    border: 1px solid var(--border2);
    border-radius: 14px;
    padding: 22px 22px 18px;
    box-shadow: 0 24px 48px rgba(0,0,0,0.45);
  }
  .edit-modal h2 {
    font-family: 'DM Serif Display', serif;
    font-size: 20px;
    font-weight: 400;
    margin-bottom: 16px;
    color: var(--text);
  }
  .edit-modal h2 em {
    color: var(--accent);
    font-style: italic;
  }
  .edit-actions {
    display: flex;
    gap: 10px;
    margin-top: 18px;
  }
  .edit-actions button {
    flex: 1;
    padding: 10px 14px;
    border-radius: 8px;
    font-family: 'Outfit', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: background 0.15s, opacity 0.15s;
  }
  .btn-edit-cancel {
    background: var(--bg3);
    color: var(--text2);
    border: 1px solid var(--border) !important;
  }
  .btn-edit-cancel:hover { color: var(--text); border-color: var(--border2) !important; }
  .btn-edit-save {
    background: var(--accent);
    color: #0f0f13;
  }
  .btn-edit-save:hover { background: var(--accent2); }

  .date-group { margin-bottom: 16px; }
  .date-label {
    font-size: 10px;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    font-family: 'DM Mono', monospace;
    margin-bottom: 8px;
    padding-left: 2px;
  }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--accent);
    color: #0f0f13;
    padding: 10px 18px;
    border-radius: 10px;
    font-size: 13px;
    font-weight: 600;
    opacity: 0;
    transform: translateY(8px);
    transition: all 0.2s;
    pointer-events: none;
    z-index: 999;
  }
  .toast.show { opacity: 1; transform: translateY(0); }
</style>
</head>
<body>

<div class="titlebar">
  <span class="titlebar-title">gastos · control personal</span>
</div>

<div class="app">
  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="brand">
        <div class="brand-icon">
          <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M8 2v12M5 5h4.5a1.5 1.5 0 010 3H6a1.5 1.5 0 000 3H11" stroke="#0f0f13" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </div>
        <span class="brand-name">Gasto<em style="font-style:italic;color:var(--accent)">Flow</em></span>
      </div>

      <div class="stat-card">
        <div class="stat-label" id="stat-mes-label">Total — mes</div>
        <div class="stat-value" id="total-mes">$0</div>
        <div class="stat-sub" id="total-sub">0 gastos registrados</div>
      </div>
      <div class="stat-card stat-card--tips">
        <div class="stat-label" id="stat-propinas-label">Propinas — mes</div>
        <div class="stat-value" id="total-propinas">$0</div>
        <div class="stat-sub" id="propinas-sub">0 gastos con propina</div>
      </div>
    </div>

    <div class="form-section">
      <div class="form-title">Nuevo gasto</div>

      <div class="field">
        <label>Descripción</label>
        <input type="text" id="inp-desc" placeholder="ej. Tacos de canasta" maxlength="60">
      </div>
      <div class="field">
        <label>Fecha del gasto</label>
        <input type="date" id="inp-fecha" title="Por defecto es hoy; cámbiala si el gasto fue en otro día">
      </div>
      <div class="field">
        <label>Importe (MXN, sin propina)</label>
        <input type="number" id="inp-importe" placeholder="0.00" min="0" step="0.01">
      </div>
      <div class="field">
        <label>Propina (opcional)</label>
        <input type="number" id="inp-propina" placeholder="0.00" min="0" step="0.01">
      </div>
      <div class="field">
        <label>Categoría</label>
        <select id="inp-cat">
          <option value="comida">🌮 Comida</option>
          <option value="postres">🍰 Postres</option>
          <option value="despensa">🛒 Despensa</option>
          <option value="transporte">🚌 Transporte</option>
          <option value="seguro">🛡️ Seguro</option>
          <option value="entretenimiento">🎬 Entretenimiento</option>
          <option value="salud">💊 Salud</option>
          <option value="servicios">⚡ Servicios</option>
          <option value="capacitacion">📚 Capacitación</option>
          <option value="ropa">👕 Ropa</option>
          <option value="rufo">🐕 Gastos Rufo</option>
          <option value="otro">📦 Otro</option>
        </select>
      </div>
      <div class="field">
        <label>¿Quién gastó?</label>
        <select id="inp-persona">
          <option value="Dafne Avila" selected>Dafne Avila</option>
          <option value="Ricardo Gama">Ricardo Gama</option>
        </select>
      </div>
      <button class="btn-add" onclick="agregarGasto()">+ Agregar gasto</button>

      <div class="form-title" style="margin-top:18px">Exportar</div>
      <button type="button" class="btn-export" onclick="descargarExcel(false)">Descargar Excel (mes consultado)</button>
      <button type="button" class="btn-export secondary" onclick="descargarExcel(true)">Excel — todo el historial</button>

      <div class="cat-bars" id="cat-bars" style="margin-top:20px;display:none;">
        <div class="form-title">Por categoría</div>
        <div id="bars-inner"></div>
      </div>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">
    <div class="main-header">
      <h1 class="main-title">Mis <em>gastos</em></h1>
      <div class="main-header-actions">
        <span class="month-nav-label">Ver mes</span>
        <input type="month" class="input-month" id="mes-consulta" title="Cambiar mes de la lista y resumen">
      </div>
    </div>

    <div class="filter-bar">
      <button type="button" class="filter-btn filter-cat active" onclick="setFilter('todos', this)">Todos</button>
      <button type="button" class="filter-btn filter-cat" onclick="setFilter('comida', this)">🌮 Comida</button>
      <button type="button" class="filter-btn filter-cat" onclick="setFilter('postres', this)">🍰 Postres</button>
      <button type="button" class="filter-btn filter-cat" onclick="setFilter('despensa', this)">🛒 Despensa</button>
      <button type="button" class="filter-btn filter-cat" onclick="setFilter('transporte', this)">🚌 Transporte</button>
      <button type="button" class="filter-btn filter-cat" onclick="setFilter('seguro', this)">🛡️ Seguro</button>
      <button type="button" class="filter-btn filter-cat" onclick="setFilter('entretenimiento', this)">🎬 Entreten.</button>
      <button type="button" class="filter-btn filter-cat" onclick="setFilter('salud', this)">💊 Salud</button>
      <button type="button" class="filter-btn filter-cat" onclick="setFilter('servicios', this)">⚡ Servicios</button>
      <button type="button" class="filter-btn filter-cat" onclick="setFilter('capacitacion', this)">📚 Capacit.</button>
      <button type="button" class="filter-btn filter-cat" onclick="setFilter('ropa', this)">👕 Ropa</button>
      <button type="button" class="filter-btn filter-cat" onclick="setFilter('rufo', this)">🐕 Rufo</button>
      <button type="button" class="filter-btn filter-cat" onclick="setFilter('otro', this)">📦 Otro</button>
    </div>

    <div class="filter-bar filter-bar-person">
      <span class="filter-group-label">Quién</span>
      <button type="button" class="filter-btn filter-person active" onclick="setPersonFilter('todos', this)">Todos</button>
      <button type="button" class="filter-btn filter-person" onclick="setPersonFilter('Dafne Avila', this)">Dafne</button>
      <button type="button" class="filter-btn filter-person" onclick="setPersonFilter('Ricardo Gama', this)">Ricardo</button>
    </div>

    <div class="filter-bar filter-bar-desc">
      <span class="filter-group-label">Descripción</span>
      <input type="search" class="input-filter-desc" id="filtro-desc" placeholder="Buscar texto en descripción…" autocomplete="off" enterkeyhint="search">
    </div>

    <div class="list-wrap" id="lista"></div>
  </div>
</div>

<div class="edit-overlay" id="edit-overlay" onclick="if(event.target===this) cerrarEditModal()">
  <div class="edit-modal" onclick="event.stopPropagation()">
    <h2>Editar <em>gasto</em></h2>
    <div class="field">
      <label>Descripción</label>
      <input type="text" id="edit-desc" maxlength="60">
    </div>
    <div class="field">
      <label>Importe (sin propina)</label>
      <input type="number" id="edit-importe" min="0" step="0.01">
    </div>
    <div class="field">
      <label>Propina</label>
      <input type="number" id="edit-propina" min="0" step="0.01" placeholder="0">
    </div>
    <div class="field">
      <label>Fecha</label>
      <input type="date" id="edit-fecha">
    </div>
    <div class="field">
      <label>Categoría</label>
      <select id="edit-cat">
        <option value="comida">🌮 Comida</option>
        <option value="postres">🍰 Postres</option>
        <option value="despensa">🛒 Despensa</option>
        <option value="transporte">🚌 Transporte</option>
        <option value="seguro">🛡️ Seguro</option>
        <option value="entretenimiento">🎬 Entretenimiento</option>
        <option value="salud">💊 Salud</option>
        <option value="servicios">⚡ Servicios</option>
        <option value="capacitacion">📚 Capacitación</option>
        <option value="ropa">👕 Ropa</option>
        <option value="rufo">🐕 Gastos Rufo</option>
        <option value="otro">📦 Otro</option>
      </select>
    </div>
    <div class="field" style="margin-bottom:0">
      <label>¿Quién gastó?</label>
      <select id="edit-persona">
        <option value="Dafne Avila">Dafne Avila</option>
        <option value="Ricardo Gama">Ricardo Gama</option>
      </select>
    </div>
    <div class="edit-actions">
      <button type="button" class="btn-edit-cancel" onclick="cerrarEditModal()">Cancelar</button>
      <button type="button" class="btn-edit-save" onclick="guardarEdicion()">Guardar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const CATS = {
  comida:          { emoji: '🌮', color: '#f97316', bg: 'rgba(249,115,22,0.15)' },
  postres:         { emoji: '🍰', color: '#e879f9', bg: 'rgba(232,121,249,0.15)' },
  despensa:        { emoji: '🛒', color: '#84cc16', bg: 'rgba(132,204,22,0.15)' },
  transporte:      { emoji: '🚌', color: '#60a5fa', bg: 'rgba(96,165,250,0.15)' },
  seguro:          { emoji: '🛡️', color: '#0ea5e9', bg: 'rgba(14,165,233,0.15)', label: 'Seguro' },
  entretenimiento: { emoji: '🎬', color: '#a78bfa', bg: 'rgba(167,139,250,0.15)' },
  salud:           { emoji: '💊', color: '#34d399', bg: 'rgba(52,211,153,0.15)' },
  servicios:       { emoji: '⚡', color: '#fbbf24', bg: 'rgba(251,191,36,0.15)' },
  capacitacion:    { emoji: '📚', color: '#6366f1', bg: 'rgba(99,102,241,0.15)', label: 'Capacitación' },
  ropa:            { emoji: '👕', color: '#f472b6', bg: 'rgba(244,114,182,0.15)' },
  rufo:            { emoji: '🐕', color: '#ea580c', bg: 'rgba(234,88,12,0.15)', label: 'Gastos Rufo' },
  otro:            { emoji: '📦', color: '#8a8898', bg: 'rgba(138,136,152,0.15)' },
}

let allGastos = []
let filtroActivo = 'todos'
let filtroPersona = 'todos'
let editId = null
let mesConsulta = ''

function isoToDateInputValue(iso) {
  const d = new Date(iso)
  const y = d.getFullYear()
  const m = String(d.getMonth() + 1).padStart(2, '0')
  const day = String(d.getDate()).padStart(2, '0')
  return `${y}-${m}-${day}`
}

function todayDateInputValue() {
  const t = new Date()
  return `${t.getFullYear()}-${String(t.getMonth() + 1).padStart(2, '0')}-${String(t.getDate()).padStart(2, '0')}`
}

function fmt(n) {
  return '$' + n.toLocaleString('es-MX', { minimumFractionDigits: 2, maximumFractionDigits: 2 })
}

function fmtFecha(iso) {
  const d = new Date(iso)
  return d.toLocaleDateString('es-MX', { weekday: 'short', day: 'numeric', month: 'short' })
}

function fmtFechaKey(iso) {
  const d = new Date(iso)
  return d.toLocaleDateString('es-MX', { day: 'numeric', month: 'long', year: 'numeric' })
}

function etiquetaPersona(persona) {
  if (persona === 'Ricardo Gama') return 'Ricardo Gama'
  if (persona === 'Dafne Avila') return 'Dafne Avila'
  return persona || 'Dafne Avila'
}

function etiquetaCategoria(slug) {
  const c = CATS[slug]
  if (c && c.label) return c.label
  return slug
}

function normBusqueda(s) {
  return String(s)
    .normalize('NFD')
    .replace(/\p{M}/gu, '')
    .toLowerCase()
}

function escapeHtml(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
}

function isoBelongsToMonth(iso, ym) {
  const d = new Date(iso)
  const key = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`
  return key === ym
}

function fmtRangoMes(ym) {
  if (!ym || !/^\d{4}-\d{2}$/.test(ym)) return '—'
  const [y, m] = ym.split('-').map(Number)
  const d = new Date(y, m - 1, 1)
  const s = d.toLocaleDateString('es-MX', { month: 'long', year: 'numeric' })
  return s.charAt(0).toUpperCase() + s.slice(1)
}

function syncMesConsultaUI() {
  const p =
    filtroPersona !== 'todos'
      ? ` · ${filtroPersona === 'Ricardo Gama' ? 'Ricardo' : 'Dafne'}`
      : ''
  document.getElementById('stat-mes-label').textContent = 'Total — ' + fmtRangoMes(mesConsulta) + p
  document.getElementById('stat-propinas-label').textContent = 'Propinas — ' + fmtRangoMes(mesConsulta) + p
}

function setFilter(cat, btn) {
  filtroActivo = cat
  document.querySelectorAll('.filter-cat').forEach(b => b.classList.remove('active'))
  btn.classList.add('active')
  renderLista()
}

function setPersonFilter(personKey, btn) {
  filtroPersona = personKey
  document.querySelectorAll('.filter-person').forEach(b => b.classList.remove('active'))
  btn.classList.add('active')
  syncMesConsultaUI()
  renderLista()
  renderStats()
}

function renderLista() {
  const lista = document.getElementById('lista')
  let gastos = allGastos.filter(g => isoBelongsToMonth(g.fecha, mesConsulta))
  if (filtroPersona !== 'todos') {
    gastos = gastos.filter(g => g.persona === filtroPersona)
  }
  if (filtroActivo !== 'todos') {
    gastos = gastos.filter(g => g.categoria === filtroActivo)
  }

  const qDesc = (document.getElementById('filtro-desc').value || '').trim()
  if (qDesc) {
    const nq = normBusqueda(qDesc)
    gastos = gastos.filter(g => normBusqueda(g.descripcion || '').includes(nq))
  }

  if (gastos.length === 0) {
    const pHint = filtroPersona !== 'todos'
      ? ` · ${filtroPersona === 'Ricardo Gama' ? 'Ricardo' : 'Dafne'}`
      : ''
    const qHint = qDesc
      ? `<br><span style="font-size:12px;color:var(--text3)">Nada coincide con «${escapeHtml(qDesc)}»</span>`
      : ''
    lista.innerHTML = `<div class="empty-state">
      <div class="empty-icon">💸</div>
      <div class="empty-text">Sin gastos en ${fmtRangoMes(mesConsulta)}${pHint}${qHint}</div>
    </div>`
    return
  }

  const grupos = {}
  gastos.forEach(g => {
    const key = fmtFechaKey(g.fecha)
    if (!grupos[key]) grupos[key] = []
    grupos[key].push(g)
  })

  lista.innerHTML = Object.entries(grupos).map(([fecha, items]) => `
    <div class="date-group">
      <div class="date-label">${fecha}</div>
      ${items.map(g => {
        const cat = CATS[g.categoria] || CATS.otro
        return `<div class="gasto-item" id="item-${g.id}" title="Clic para editar" onclick="abrirEditar(event, ${g.id})">
          <div class="gasto-cat-icon" style="background:${cat.bg}">
            <span style="font-size:16px">${cat.emoji}</span>
          </div>
          <div class="gasto-info">
            <div class="gasto-desc">${g.descripcion}</div>
            <div class="gasto-meta">
              <span style="color:${cat.color};background:${cat.bg};padding:1px 7px;border-radius:10px;font-size:10px;text-transform:uppercase;letter-spacing:0.05em;font-weight:500">${etiquetaCategoria(g.categoria)}</span>
              <span class="gasto-persona">${etiquetaPersona(g.persona)}</span>
              <span>${fmtFecha(g.fecha)}</span>
            </div>
          </div>
          <div class="gasto-monto-wrap">
            <div class="gasto-monto">${fmt(g.monto)}</div>
            ${Number(g.propina) > 0 ? `<div class="gasto-tip-badge" title="Propina incluida en el total">Propina ${fmt(g.propina)}</div>` : ''}
          </div>
          <button class="btn-delete" onclick="event.stopPropagation(); eliminar(${g.id})" title="Eliminar">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
              <path d="M2 2l10 10M12 2L2 12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
          </button>
        </div>`
      }).join('')}
    </div>
  `).join('')
}

async function renderStats() {
  const stats = await window.gastos.getStats({
    yearMonth: mesConsulta,
    persona: filtroPersona,
  })

  document.getElementById('total-mes').textContent = fmt(stats.total)
  const pSub =
    filtroPersona !== 'todos'
      ? ` · ${filtroPersona === 'Ricardo Gama' ? 'Ricardo' : 'Dafne'}`
      : ''
  document.getElementById('total-sub').textContent = `${stats.cantidad} gasto${stats.cantidad !== 1 ? 's' : ''} · ${fmtRangoMes(mesConsulta)}${pSub}`

  const tip = Number(stats.propinasTotal ?? 0)
  const nTip = Number(stats.gastosConPropina ?? 0)
  document.getElementById('total-propinas').textContent = fmt(tip)
  document.getElementById('propinas-sub').textContent =
    `${nTip} gasto${nTip !== 1 ? 's' : ''} con propina · ${fmtRangoMes(mesConsulta)}${pSub}`

  const barsEl = document.getElementById('cat-bars')
  const inner = document.getElementById('bars-inner')

  const entries = Object.entries(stats.porCategoria).sort((a, b) => b[1] - a[1])
  if (entries.length === 0) { barsEl.style.display = 'none'; return }

  barsEl.style.display = 'block'
  const max = entries[0][1]
  inner.innerHTML = entries.map(([cat, val]) => {
    const c = CATS[cat] || CATS.otro
    const pct = Math.round((val / max) * 100)
    return `<div class="cat-bar-item">
      <div class="cat-bar-info">
        <span class="cat-bar-name"><span class="cat-dot" style="background:${c.color}"></span>${c.emoji} ${etiquetaCategoria(cat)}</span>
        <span class="cat-bar-val">${fmt(val)}</span>
      </div>
      <div class="cat-bar-bg"><div class="cat-bar-fill" style="width:${pct}%;background:${c.color}"></div></div>
    </div>`
  }).join('')
}

function showToast(msg) {
  const t = document.getElementById('toast')
  t.textContent = msg
  t.classList.add('show')
  setTimeout(() => t.classList.remove('show'), 2200)
}

async function descargarExcel(todoHistorial) {
  const r = await window.gastos.exportExcel(todoHistorial ? null : mesConsulta)
  if (!r || r.canceled) return
  showToast('Excel guardado ✓')
}

async function agregarGasto() {
  const desc = document.getElementById('inp-desc').value.trim()
  const fecha = document.getElementById('inp-fecha').value
  const importe = parseFloat(document.getElementById('inp-importe').value)
  const propinaRaw = document.getElementById('inp-propina').value
  const propina = propinaRaw === '' ? 0 : parseFloat(propinaRaw)
  const cat = document.getElementById('inp-cat').value

  if (!desc) { document.getElementById('inp-desc').focus(); return }
  if (!fecha) { document.getElementById('inp-fecha').focus(); return }
  if (!importe || importe <= 0) { document.getElementById('inp-importe').focus(); return }
  if (Number.isNaN(propina) || propina < 0) { document.getElementById('inp-propina').focus(); return }

  const persona = document.getElementById('inp-persona').value
  allGastos = await window.gastos.addGasto({
    descripcion: desc,
    fecha,
    importe,
    propina,
    categoria: cat,
    persona,
  })

  document.getElementById('inp-desc').value = ''
  document.getElementById('inp-importe').value = ''
  document.getElementById('inp-propina').value = ''
  document.getElementById('inp-fecha').value = todayDateInputValue()
  document.getElementById('inp-desc').focus()

  renderLista()
  renderStats()
  showToast('Gasto agregado ✓')
}

async function eliminar(id) {
  allGastos = await window.gastos.deleteGasto(id)
  renderLista()
  renderStats()
}

function abrirEditar(ev, id) {
  if (ev.target.closest('.btn-delete')) return
  const g = allGastos.find(x => x.id === id)
  if (!g) return
  editId = id
  const catKeys = Object.keys(CATS)
  document.getElementById('edit-desc').value = g.descripcion
  const imp = typeof g.importe === 'number' ? g.importe : g.monto - (Number(g.propina) || 0)
  document.getElementById('edit-importe').value = imp
  const pr = typeof g.propina === 'number' ? g.propina : 0
  document.getElementById('edit-propina').value = pr > 0 ? pr : ''
  document.getElementById('edit-cat').value = catKeys.includes(g.categoria) ? g.categoria : 'otro'
  document.getElementById('edit-persona').value =
    g.persona === 'Ricardo Gama' ? 'Ricardo Gama' : 'Dafne Avila'
  document.getElementById('edit-fecha').value = isoToDateInputValue(g.fecha)
  document.getElementById('edit-overlay').classList.add('open')
  document.getElementById('edit-desc').focus()
}

function cerrarEditModal() {
  document.getElementById('edit-overlay').classList.remove('open')
  editId = null
}

async function guardarEdicion() {
  if (editId == null) return
  const desc = document.getElementById('edit-desc').value.trim()
  const importe = parseFloat(document.getElementById('edit-importe').value)
  const propinaRaw = document.getElementById('edit-propina').value
  const propina = propinaRaw === '' ? 0 : parseFloat(propinaRaw)
  const cat = document.getElementById('edit-cat').value
  const persona = document.getElementById('edit-persona').value
  const fecha = document.getElementById('edit-fecha').value
  if (!desc) { document.getElementById('edit-desc').focus(); return }
  if (!importe || importe <= 0) { document.getElementById('edit-importe').focus(); return }
  if (Number.isNaN(propina) || propina < 0) { document.getElementById('edit-propina').focus(); return }
  if (!fecha) { document.getElementById('edit-fecha').focus(); return }
  allGastos = await window.gastos.updateGasto({
    id: editId,
    descripcion: desc,
    importe,
    propina,
    categoria: cat,
    persona,
    fecha
  })
  cerrarEditModal()
  renderLista()
  renderStats()
  showToast('Gasto actualizado ✓')
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && document.getElementById('edit-overlay').classList.contains('open')) {
    cerrarEditModal()
  }
})

document.getElementById('inp-importe').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('inp-propina').focus()
})
document.getElementById('inp-propina').addEventListener('keydown', e => {
  if (e.key === 'Enter') agregarGasto()
})
document.getElementById('inp-desc').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('inp-fecha').focus()
})
document.getElementById('inp-fecha').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('inp-importe').focus()
})

async function init() {
  document.getElementById('inp-fecha').value = todayDateInputValue()

  const mesEl = document.getElementById('mes-consulta')
  const n = new Date()
  mesEl.value = `${n.getFullYear()}-${String(n.getMonth() + 1).padStart(2, '0')}`
  mesConsulta = mesEl.value
  mesEl.addEventListener('change', () => {
    mesConsulta = mesEl.value || mesConsulta
    syncMesConsultaUI()
    renderLista()
    renderStats()
  })

  document.getElementById('filtro-desc').addEventListener('input', () => {
    renderLista()
  })

  allGastos = await window.gastos.getGastos()
  syncMesConsultaUI()
  renderLista()
  renderStats()
}

init()
</script>
</body>
</html>
